<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Translute · Programação de Frota</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#F2F4F7; --bg2:#FFFFFF; --bg3:#F7F8FA; --bg4:#E8ECF0;
  --brd:rgba(27,58,107,.10); --brd2:rgba(27,58,107,.22);
  --tx:#1A2332; --tx2:#4A5568; --tx3:#8A95A0;
  --navy:#1B3A6B; --navy2:#2A4F8A;
  --green:#2E7D32; --amber:#F5A623; --red:#C62828; --blue:#1565C0;
  --purple:#6A1B9A; --gold:#E08A00; --orange:#E65C00; --teal:#00796B;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font:13px/1.5 'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}
button:focus-visible,select:focus-visible,input:focus-visible{outline:2px solid var(--amber);outline-offset:2px}

/* ===== Topbar ===== */
.topbar{height:60px;background:var(--navy);position:sticky;top:0;z-index:500;box-shadow:0 2px 12px rgba(0,0,0,.15);display:flex;align-items:center;padding:0 24px;gap:16px}
.logo{height:38px;filter:brightness(0) invert(1)}
.tb-title .tb-l{font-family:'Syne',sans-serif;font-size:11px;font-weight:600;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:2px}
.tb-title .tb-t{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:#fff;white-space:nowrap}
.tb-title .tb-t span{color:var(--amber)}
.tb-sep{width:1px;height:32px;background:rgba(255,255,255,.15)}
nav{display:flex;gap:4px;flex-wrap:wrap}
.nav-btn{position:relative;height:44px;padding:0 16px;border-radius:8px;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:rgba(255,255,255,.6);transition:all .15s;cursor:pointer}
.nav-btn:hover{color:#fff;background:rgba(255,255,255,.1)}
.nav-btn.active{color:var(--amber);background:rgba(245,166,35,.15)}
.nav-btn.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:28px;height:2px;background:var(--amber);border-radius:2px}
.nav-btn.mine::before{content:'●';position:absolute;top:6px;right:6px;font-size:8px;color:var(--amber)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.tb-upd{font-family:'DM Mono',monospace;font-size:11px;color:rgba(255,255,255,.4)}
.tb-team{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:#fff;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:6px 12px}
.tb-dot{width:8px;height:8px;border-radius:50%;background:var(--tx3);display:inline-block;margin-right:6px;vertical-align:middle}
.tb-dot.live{background:#5FD068;box-shadow:0 0 0 3px rgba(95,208,104,.25)}
.btn-refresh{height:34px;padding:0 14px;border-radius:8px;border:1px solid rgba(255,255,255,.25);background:transparent;color:#fff;font:600 12px 'DM Sans',sans-serif;cursor:pointer;transition:all .15s}
.btn-refresh:hover{border-color:var(--amber);color:var(--amber)}

.wrap{max-width:100%;margin:0;padding:18px 16px 60px}
.page{display:none}
.page.active{display:block}

/* ===== Hero ===== */
.hero{background:linear-gradient(135deg,#1B3A6B 0%,#0d2444 60%,#0a1e38 100%);border-radius:12px;padding:18px 24px;margin-bottom:18px;position:relative;overflow:hidden;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.hero::before{content:'';position:absolute;right:-40px;top:-50px;width:200px;height:200px;border-radius:50%;background:rgba(245,166,35,.1)}
.hero-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#fff;line-height:1.2}
.hero-title span{color:var(--amber)}
.hero-sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:3px}

/* ===== Cards ===== */
.cc{background:var(--bg2);border-radius:12px;border:1px solid var(--brd);padding:16px 18px}
.cc-t{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px}
.cc-s{font-size:11px;color:var(--tx3);margin-bottom:12px}

/* ===== Tabelas ===== */
.scroll{overflow:visible}
table.dt{width:100%;table-layout:fixed;border-collapse:collapse;font-size:9.5px}
table.dt th{text-align:left;padding:6px 10px 6px 4px;border-bottom:1px solid var(--brd);font-family:'Syne',sans-serif;font-size:8px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.1px;background:var(--bg3);position:sticky;top:60px;z-index:50;white-space:normal;overflow-wrap:normal;word-break:normal;line-height:1.2}
table.dt td{padding:2px 4px;border-bottom:1px solid var(--brd);color:var(--tx);white-space:normal;overflow-wrap:break-word;word-break:normal;vertical-align:top;position:relative}
table.dt tbody tr:hover td{background:var(--bg3)}
table.dt td.mono{font-family:'DM Mono',monospace;font-weight:500}
table.dt td.muted{color:var(--tx3);font-size:9px}
table.dt tr.flash td{animation:flashRow 1.4s ease}
@keyframes flashRow{0%{background:rgba(245,166,35,.35)}100%{background:transparent}}

.col-resizer{position:absolute;top:0;right:0;width:7px;height:100%;cursor:col-resize;user-select:none;z-index:2}
.col-resizer:hover,.col-resizer.active{background:rgba(245,166,35,.5)}

table.dt th[data-field]{cursor:pointer}
table.dt th[data-field]:hover{color:var(--navy)}
table.dt th.filtered{color:var(--amber) !important;background:rgba(245,166,35,.15)}
.th-label:hover{text-decoration:underline}
.fico{font-size:8px;opacity:.6}
th.filtered .fico{opacity:1}
.filter-box{position:absolute;z-index:2000;background:#fff;border:1px solid var(--brd2);border-radius:8px;box-shadow:0 10px 28px rgba(0,0,0,.2);width:220px;padding:8px}
.filter-box .filter-input{width:100%;box-sizing:border-box;height:32px;border:1px solid var(--brd2);border-radius:6px;padding:0 8px;font:500 12px 'DM Sans',sans-serif;margin-bottom:4px}
.filter-box .filter-list{max-height:160px;overflow:auto}
.filter-box .ac-item{padding:5px 8px;font-size:11.5px;border-radius:5px}
.filter-box .filter-clear{padding:6px 8px;font-size:11px;color:var(--red);cursor:pointer;border-top:1px solid var(--brd);margin-top:4px;text-align:center}
.filter-box .filter-clear:hover{background:rgba(198,40,40,.08)}

.cell-in{display:block;width:100%;min-width:0;font:500 9.5px 'DM Sans',sans-serif;border:1px solid transparent;border-radius:5px;padding:2px 3px;background:transparent;color:var(--tx);box-sizing:border-box}
.cell-in:hover{border-color:var(--brd2)}
.cell-in:focus{border-color:var(--amber);background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.1)}
input.cell-in:focus{position:relative;z-index:6;width:max(100%,220px);font-size:12px;padding:5px 7px;box-shadow:0 4px 14px rgba(0,0,0,.18)}
textarea.cell-in{resize:none;overflow:hidden;line-height:1.35;font-family:'DM Sans',sans-serif;white-space:pre-wrap;overflow-wrap:break-word;word-break:normal}
select.cell-in{cursor:pointer}
td.ro{color:var(--tx2)}

/* ===== Autocompletar (substitui datalist nativo p/ funcionar com textarea) ===== */
.ac-box{position:absolute;z-index:2000;background:#fff;border:1px solid var(--brd2);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.18);max-height:220px;max-width:calc(100vw - 16px);overflow:auto}
.ac-item{padding:6px 10px;font:500 12px 'DM Sans',sans-serif;color:var(--tx);cursor:pointer}
.ac-item:hover{background:var(--bg3)}

/* ===== Resumo de status ===== */
.resumo-card{border:1px solid var(--brd);border-radius:10px;margin-bottom:10px;overflow:hidden}
.resumo-head{width:100%;display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--bg2);border:none;cursor:pointer;text-align:left;font:600 12px 'DM Sans',sans-serif;color:var(--tx)}
.resumo-head:hover{background:var(--bg3)}
.resumo-count{color:var(--tx3);font-size:12px}
.resumo-arrow{margin-left:auto;transition:transform .15s;color:var(--tx3)}
.resumo-head.open .resumo-arrow{transform:rotate(180deg)}
.resumo-list{border-top:1px solid var(--brd)}

/* ===== Filtro rápido de placa (funciona no celular também) ===== */
.placa-filter-bar{display:flex;gap:8px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
.placa-filter-bar input[type=text]{flex:1;min-width:140px;height:38px;border:1px solid var(--brd2);border-radius:8px;padding:0 12px;font:600 13px 'DM Mono',monospace;text-transform:uppercase;background:var(--bg2);color:var(--tx)}
.placa-filter-bar input::placeholder{font-family:'DM Sans',sans-serif;text-transform:none;font-weight:500}
.btn-cam{height:38px;width:38px;flex-shrink:0;border-radius:8px;border:1px solid var(--brd2);background:var(--bg2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.btn-cam:hover{border-color:var(--amber)}
.cam-status{width:100%;font-size:11px;color:var(--tx3);margin-bottom:8px;min-height:14px}
.ocr-sug-list{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.ocr-sug-btn{height:26px;padding:0 10px;border-radius:6px;border:1px solid var(--brd2);background:var(--bg2);font:700 11px 'DM Mono',monospace;cursor:pointer;color:var(--navy)}
.ocr-sug-btn:hover{background:var(--navy);color:#fff;border-color:var(--navy)}

/* ===== Produtividade (Km x meta) ===== */
.prod-cell{display:flex;flex-direction:column;gap:3px;align-items:flex-end}
.prod-top{display:flex;align-items:baseline;gap:6px;white-space:nowrap}
.prod-pct{font-family:'DM Mono',monospace;font-weight:700;font-size:10.5px}
.prod-bar{width:100%;max-width:90px;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.prod-bar-fill{display:block;height:100%;border-radius:2px}

/* ===== Badges ===== */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;white-space:nowrap}
.bg2c{background:rgba(46,125,50,.1);color:var(--green)}
.br2{background:rgba(198,40,40,.1);color:var(--red)}
.ba{background:rgba(245,166,35,.12);color:var(--gold)}
.bb{background:rgba(21,101,192,.1);color:var(--blue)}
.btl{background:rgba(0,121,107,.1);color:var(--teal)}
.bn{background:rgba(27,58,107,.1);color:var(--navy)}

/* ===== Gestão de veículos ===== */
.addbar{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px;padding:12px;background:var(--bg3);border-radius:10px;border:1px dashed var(--brd2)}
.addbar .fld{display:flex;flex-direction:column;gap:3px}
.addbar label{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase}
.addbar input,.addbar select{height:32px;border:1px solid var(--brd2);border-radius:7px;padding:0 9px;font:500 12px 'DM Sans',sans-serif;background:#fff}
.btn-add{height:32px;padding:0 16px;border-radius:7px;border:none;background:var(--navy);color:#fff;font:600 12px 'DM Sans',sans-serif;cursor:pointer}
.btn-add:hover{background:var(--navy2)}
.btn-del{border:none;background:transparent;color:var(--red);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:5px}
.btn-del:hover{background:rgba(198,40,40,.1)}
.btn-hist{border:none;background:transparent;color:var(--navy);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:5px}
.btn-hist:hover{background:rgba(27,58,107,.1)}

/* ===== Modal de histórico ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(10,20,40,.55);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal-box{background:#fff;border-radius:12px;padding:20px 22px;width:520px;max-width:92vw;max-height:70vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.modal-box h3{font-family:'Syne',sans-serif;font-size:14px;color:var(--navy);margin-bottom:12px}
.hist-item{border-bottom:1px solid var(--brd);padding:10px 0;display:flex;justify-content:space-between;align-items:center;gap:10px}
.hist-item:last-child{border-bottom:none}
.hist-info{font-size:12px;line-height:1.5}
.hist-campo{font-family:'Syne',sans-serif;font-weight:700;color:var(--navy);text-transform:uppercase;font-size:10px}
.hist-vals{color:var(--tx2)}
.hist-vals .old{color:var(--red);text-decoration:line-through}
.hist-vals .new{color:var(--green)}
.hist-when{color:var(--tx3);font-size:10px;font-family:'DM Mono',monospace}
.btn-restore{height:28px;padding:0 10px;border-radius:6px;border:1px solid var(--brd2);background:var(--bg3);color:var(--navy);font:600 11px 'DM Sans',sans-serif;cursor:pointer;white-space:nowrap}
.btn-restore:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
.modal-close{margin-top:14px;height:32px;padding:0 14px;border-radius:7px;border:none;background:var(--bg4);color:var(--tx);font:600 12px 'DM Sans',sans-serif;cursor:pointer}

/* ===== Login ===== */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1B3A6B 0%,#0d2444 60%,#0a1e38 100%)}
.login-card{background:#fff;border-radius:16px;padding:36px 34px;width:340px;max-width:88vw;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.login-card h1{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--navy);margin-bottom:4px}
.login-card p{font-size:11px;color:var(--tx3);margin-bottom:22px}
.login-card label{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;display:block;margin-bottom:5px}
.login-card input{width:100%;height:38px;border:1px solid var(--brd2);border-radius:8px;padding:0 12px;font:500 13px 'DM Sans',sans-serif;margin-bottom:14px}
.login-card button{width:100%;height:40px;border-radius:8px;border:none;background:var(--amber);color:#1A2332;font:700 13px 'Syne',sans-serif;cursor:pointer;margin-top:4px}
.login-card button:hover{background:#e0951a}
.login-err{color:var(--red);font-size:11px;margin-top:-6px;margin-bottom:10px;min-height:14px}
.hidden{display:none !important}

/* ===== Celular: tabela vira lista de cartões ===== */
@media (max-width: 780px){
  .topbar{height:auto;flex-wrap:wrap;padding:10px 14px;row-gap:8px}
  .tb-sep{display:none}
  .tb-title{order:1}
  .logo{order:0;height:28px}
  nav{order:3;width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
  nav::-webkit-scrollbar{height:4px}
  .tb-right{order:2;margin-left:auto;flex-wrap:wrap;justify-content:flex-end;gap:6px}
  .tb-upd{display:none}
  .wrap{padding:12px 10px 60px}
  .hero{padding:14px 16px}
  .hero-title{font-size:16px}
  .addbar,.addbar .fld{width:100%}
  .addbar{flex-direction:column;align-items:stretch}
  .addbar input,.addbar select{width:100% !important}

  .scroll{overflow:visible}
  table.dt,table.dt thead,table.dt tbody,table.dt tr,table.dt th,table.dt td{display:block;width:100% !important}
  table.dt thead{display:none}
  table.dt tbody tr{
    background:var(--bg2);border:1px solid var(--brd);border-radius:12px;
    padding:4px 12px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);position:static;
  }
  table.dt tbody tr:hover td{background:transparent}
  table.dt td{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:8px 0;border-bottom:1px dashed var(--brd);text-align:right;position:static;
  }
  table.dt td:last-child{border-bottom:none}
  table.dt td::before{
    content:attr(data-label);font:700 10px 'Syne',sans-serif;text-transform:uppercase;
    letter-spacing:.3px;color:var(--tx3);text-align:left;flex-shrink:0;margin-right:10px;
  }
  table.dt td[data-label="Placa"]{
    font-size:15px;font-weight:800;color:var(--navy);border-bottom:2px solid var(--amber);
    padding-bottom:10px;margin-bottom:2px;
  }
  table.dt td .cell-in,table.dt td textarea.cell-in,table.dt td select.cell-in,table.dt td input.cell-in{
    text-align:right;max-width:65%;margin-left:auto;
  }
  input.cell-in:focus{width:100% !important;max-width:100% !important}
  table.dt td[data-label="Ações"]{justify-content:flex-end;gap:14px}
  table.dt td[data-label="Ações"]::before{content:''}
  .btn-hist,.btn-del{font-size:18px;padding:6px 8px}

  .modal-box{width:94vw;padding:16px}
  .hist-item{flex-direction:column;align-items:flex-start;gap:6px}
  .btn-restore{align-self:flex-end}
}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login-screen">
  <form class="login-card" id="loginForm">
    <h1>Translute · Programação de Frota</h1>
    <p>Entre com o login da sua equipe</p>
    <label>E-mail</label>
    <input type="email" id="loginEmail" required autocomplete="username">
    <label>Senha</label>
    <input type="password" id="loginPass" required autocomplete="current-password">
    <div class="login-err" id="loginErr"></div>
    <button type="submit">Entrar</button>
  </form>
</div>

<!-- ============ APP ============ -->

<script>
/* =====================================================================
   CONFIGURAÇÃO — troque pelos valores do seu projeto Supabase
   ===================================================================== */
const SUPABASE_URL = 'https://rzxejlbxhbwbzpvkqcrs.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_Xd0csG6Z76hiV1UsNvnTmA_TqM8Z5Cs';

const EQUIPES = ['Alpha', 'Bravo', 'Charlie', 'Delta', 'Fixos'];
// Para adicionar "Externos" (ou outra equipe) depois, basta incluir aqui.

const STATUS_GERAL_OPTS = ['Carregado', 'Disponivel', 'Manutenção', 'Dedicado', 'Em Deslocamento'];

const STATUS_BADGE = {
  'Carregado': 'bb',
  'Disponivel': 'bg2c',
  'Manutenção': 'br2',
  'Dedicado': 'btl',
  'Em Deslocamento': 'ba',
};

const UF_REGIAO = {
  AC:'Norte', AL:'Nordeste', AP:'Norte', AM:'Norte', BA:'Nordeste', CE:'Nordeste',
  DF:'Centro-Oeste', ES:'Sudeste', GO:'Centro-Oeste', MA:'Nordeste', MT:'Centro-Oeste',
  MS:'Centro-Oeste', MG:'Sudeste', PA:'Norte', PB:'Nordeste', PR:'Sul', PE:'Nordeste',
  PI:'Nordeste', RJ:'Sudeste', RN:'Nordeste', RS:'Sul', RO:'Norte', RR:'Norte',
  SC:'Sul', SP:'Sudeste', SE:'Nordeste', TO:'Norte',
};

function extractUF(texto) {
  if (!texto) return '';
  const partes = String(texto).split('/');
  if (partes.length < 2) return '';
  const uf = partes[partes.length - 1].trim().toUpperCase();
  return UF_REGIAO[uf] ? uf : '';
}
function regiaoDaUF(uf) { return UF_REGIAO[uf] || ''; }

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* =====================================================================
   ESTADO
   ===================================================================== */
let currentUser = null;
let currentTeam = null;
let isAdmin = false;
let veiculos = new Map();      // id -> veiculo
let programacao = new Map();   // veiculo_id -> programacao
let motoristas = new Map();    // matricula -> {matricula,nome,funcao,filial}
let nomeToMatricula = new Map(); // nome normalizado -> matricula
let heAtual = new Map();       // matricula -> registro de horas_extras do período mais recente
let periodoAtualHE = null;
let produtividadeAtual = new Map(); // placa -> registro de produtividade do período mais recente
let periodoAtualProdutividade = null;
let activeTab = 'geral';
let editingKey = null;         // `${veiculoId}:${field}` do input com foco no momento
let realtimeReady = false;

/* =====================================================================
   LOGIN
   ===================================================================== */
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginErr');
  errEl.textContent = '';
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { errEl.textContent = 'E-mail ou senha inválidos.'; return; }
  await afterLogin(data.user);
});

document.getElementById('btnLogout').addEventListener('click', async () => {
  await sb.auth.signOut();
  location.reload();
});

async function afterLogin(user) {
  currentUser = user;
  const { data: profile, error } = await sb.from('profiles').select('equipe,nome_exibicao,is_admin').eq('id', user.id).single();
  if (error || !profile) {
    document.getElementById('loginErr').textContent = 'Login sem perfil de equipe associado. Fale com o administrador.';
    await sb.auth.signOut();
    return;
  }
  currentTeam = profile.equipe;
  isAdmin = !!profile.is_admin;
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('teamBadge').textContent = profile.nome_exibicao || currentTeam;
  buildTabs();

/* =====================================================================
   CARGA DE DADOS
   ===================================================================== */
const MESES_ORDEM = ['JAN', 'FEV', 'MAR', 'ABR', 'MAI', 'JUN', 'JUL', 'AGO', 'SET', 'OUT', 'NOV', 'DEZ'];
function periodoKey(periodo) {
  if (!periodo) return -1;
  return MESES_ORDEM.indexOf(periodo.split('-')[0].trim().toUpperCase().slice(0, 3));
}
const MESES_ORDEM_FULL = ['JANEIRO', 'FEVEREIRO', 'MARCO', 'ABRIL', 'MAIO', 'JUNHO', 'JULHO', 'AGOSTO', 'SETEMBRO', 'OUTUBRO', 'NOVEMBRO', 'DEZEMBRO'];
function periodoMesAnoKey(periodo) {
  if (!periodo) return -1;
  const [mes, ano] = periodo.split('/');
  const idx = MESES_ORDEM_FULL.indexOf(normalizeNome(mes));
  return (parseInt(ano, 10) || 0) * 100 + (idx >= 0 ? idx : -1);
}
function normalizeNome(s) {
  const semAcento = (s || '').toString().normalize('NFD').split('').filter(ch => {
    const code = ch.charCodeAt(0);
    return code < 0x0300 || code > 0x036f;
  }).join('');
  return semAcento.toUpperCase().trim().replace(/\s+/g, ' ');
}
function horasToHHMM(dec) {
  if (dec == null) return '';
  const sinal = dec < 0 ? '-' : '';
  const abs = Math.abs(dec);
  const h = Math.floor(abs);
  const m = Math.round((abs - h) * 60);
  return `${sinal}${h}:${String(m).padStart(2, '0')}`;
}

async function fetchAll(buildQuery) {
  let all = [];
  let from = 0;
  const pageSize = 1000;
  while (true) {
    const { data, error } = await buildQuery().range(from, from + pageSize - 1);
    if (error) { console.error(error); break; }
    if (!data || !data.length) break;
    all = all.concat(data);
    if (data.length < pageSize) break;
    from += pageSize;
  }
  return all;
}

async function loadAll() {
  const [vs, ps, ms, hs, pds] = await Promise.all([
    fetchAll(() => sb.from('veiculos').select('*').eq('ativo', true)),
    fetchAll(() => sb.from('programacao').select('*')),
    fetchAll(() => sb.from('motoristas').select('*')),
    fetchAll(() => sb.from('horas_extras').select('*')),
    fetchAll(() => sb.from('produtividade_veiculos').select('*')),
  ]);
  veiculos = new Map((vs || []).map(v => [v.id, v]));
  programacao = new Map((ps || []).map(p => [p.veiculo_id, p]));
  motoristas = new Map((ms || []).map(m => [m.matricula, m]));
  nomeToMatricula = new Map((ms || []).map(m => [normalizeNome(m.nome), m.matricula]));

  let melhor = null, melhorKey = -1;
  (hs || []).forEach(h => { const k = periodoKey(h.periodo); if (k > melhorKey) { melhorKey = k; melhor = h.periodo; } });
  periodoAtualHE = melhor;
  heAtual = new Map((hs || []).filter(h => h.periodo === periodoAtualHE).map(h => [h.matricula, h]));

  let melhorProd = null, melhorProdKey = -1;
  (pds || []).forEach(p => { const k = periodoMesAnoKey(p.periodo); if (k > melhorProdKey) { melhorProdKey = k; melhorProd = p.periodo; } });
  periodoAtualProdutividade = melhorProd;
  produtividadeAtual = new Map((pds || []).filter(p => p.periodo === periodoAtualProdutividade).map(p => [p.placa, p]));

  let heSyncEm = null;
  (hs || []).forEach(h => { if (h.atualizado_em && (!heSyncEm || h.atualizado_em > heSyncEm)) heSyncEm = h.atualizado_em; });
  const heUpdEl = document.getElementById('heUpd');
  if (heUpdEl) {
    heUpdEl.textContent = heSyncEm
      ? `HE (${periodoAtualHE}) sincronizada em ${new Date(heSyncEm).toLocaleString('pt-BR')}`
      : '';
  }

  let prodSyncEm = null;
  (pds || []).forEach(p => { if (p.atualizado_em && (!prodSyncEm || p.atualizado_em > prodSyncEm)) prodSyncEm = p.atualizado_em; });
  const prodUpdEl = document.getElementById('prodUpd');
  if (prodUpdEl) {
    prodUpdEl.textContent = prodSyncEm
      ? `Produtividade (${periodoAtualProdutividade}) sincronizada em ${new Date(prodSyncEm).toLocaleString('pt-BR')}`
      : '';
  }

  rebuildSuggestions();
  if (activeTab === 'historico') { /* histórico não usa dados ao vivo */ }
  else if (activeTab === 'resumo') renderResumo();
  else renderPage(activeTab);
}

/* =====================================================================
   SUGESTÕES (autocompletar próprio — funciona com textarea, ao contrário
   do <datalist> nativo, que só funciona com <input>)
   ===================================================================== */
const AC_FIELDS = ['motorista', 'status', 'localizacao', 'destino_final', 'proximo_destino', 'previsao_chegada_filial', 'observacoes'];
let SUGGESTIONS = {};

function rebuildSuggestions() {
  const values = {};
  AC_FIELDS.forEach(f => values[f] = new Set());
  for (const p of programacao.values()) {
    AC_FIELDS.forEach(f => { if (p[f]) values[f].add(p[f]); });
  }
  for (const m of motoristas.values()) { if (m.nome) values.motorista.add(m.nome); }
  AC_FIELDS.forEach(f => { SUGGESTIONS[f] = [...values[f]].sort(); });
}

let acBox = null;
function hideSuggestions() { if (acBox) { acBox.remove(); acBox = null; } }
function showSuggestions(el, field) {
  hideSuggestions();
  const list = SUGGESTIONS[field];
  if (!list || !list.length) return;
  const q = el.value.trim().toLowerCase();
  const opts = (q ? list.filter(v => v.toLowerCase().includes(q)) : list).slice(0, 8);
  if (!opts.length) return;
  const rect = el.getBoundingClientRect();
  const largura = Math.max(rect.width, 200);
  acBox = document.createElement('div');
  acBox.className = 'ac-box';
  acBox.style.left = Math.min(rect.left + window.scrollX, window.innerWidth - largura - 8) + 'px';
  acBox.style.top = (rect.bottom + window.scrollY + 3) + 'px';
  acBox.style.width = largura + 'px';
  acBox.innerHTML = opts.map(o => `<div class="ac-item">${esc(o)}</div>`).join('');
  document.body.appendChild(acBox);
  [...acBox.children].forEach((item, i) => {
    item.addEventListener('mousedown', (ev) => {
      ev.preventDefault();
      el.value = opts[i];
      hideSuggestions();
      autoGrow(el);
      el.dispatchEvent(new Event('change'));
    });
  });
}

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = (el.scrollHeight + 2) + 'px';
}

/* =====================================================================
   COLUNAS REDIMENSIONÁVEIS (largura salva no navegador, por rótulo)
   ===================================================================== */
function loadColWidths() {
  try { return JSON.parse(localStorage.getItem('frota_col_widths') || '{}'); } catch (e) { return {}; }
}
function saveColWidth(label, px) {
  const w = loadColWidths();
  w[label] = Math.round(px);
  localStorage.setItem('frota_col_widths', JSON.stringify(w));
}
function attachColResize(theadRow) {
  if (!theadRow) return;
  theadRow.querySelectorAll('th').forEach(th => {
    const handle = document.createElement('span');
    handle.className = 'col-resizer';
    th.appendChild(handle);
    handle.addEventListener('mousedown', (e) => {
      e.preventDefault();
      e.stopPropagation();
      handle.classList.add('active');
      const startX = e.clientX;
      const startW = th.getBoundingClientRect().width;
      const label = th.dataset.label;
      function onMove(ev) {
        const w = Math.max(36, startW + (ev.clientX - startX));
        th.style.width = w + 'px';
        if (label) saveColWidth(label, w);
      }
      function onUp() {
        handle.classList.remove('active');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
}

/* =====================================================================
   FILTROS NOS CABEÇALHOS DAS COLUNAS
   ===================================================================== */
let filterBox = null;
function closeColumnFilter() {
  if (filterBox) { filterBox.remove(); filterBox = null; }
  document.removeEventListener('mousedown', onDocClickCloseFilter);
}
function onDocClickCloseFilter(e) {
  if (filterBox && !filterBox.contains(e.target)) closeColumnFilter();
}

function attachColFilters(theadRow, tab) {
  if (!theadRow) return;
  theadRow.querySelectorAll('th[data-field]').forEach(th => {
    th.addEventListener('click', () => openColumnFilter(th, th.dataset.field, tab));
  });
}

function attachColSort(theadRow, tab) {
  if (!theadRow) return;
  theadRow.querySelectorAll('.th-label').forEach(lbl => {
    const field = lbl.dataset.sortField;
    if (!field) return;
    lbl.addEventListener('click', (e) => {
      e.stopPropagation();
      if (sortState.field === field) sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
      else sortState = { field, dir: 'asc' };
      renderPage(tab);
    });
  });
}

function openColumnFilter(th, field, tab) {
  if (filterBox && filterBox.dataset.field === field) { closeColumnFilter(); return; }
  closeColumnFilter();
  const rect = th.getBoundingClientRect();
  const current = columnFilters[field] || '';
  const distinct = [...new Set(veiculosDaEquipe(tab).map(v => fieldValue(v, programacao.get(v.id), field)).filter(Boolean))].sort();

  filterBox = document.createElement('div');
  filterBox.className = 'filter-box';
  filterBox.dataset.field = field;
  filterBox.style.left = Math.min(rect.left + window.scrollX, window.innerWidth - 240) + 'px';
  filterBox.style.top = (rect.bottom + window.scrollY + 3) + 'px';
  filterBox.innerHTML = `
    <input type="text" class="filter-input" placeholder="Filtrar…" value="${esc(current)}">
    <div class="filter-list">${distinct.slice(0, 40).map(d => `<div class="ac-item">${esc(d)}</div>`).join('')}</div>
    <div class="filter-clear">Limpar filtro</div>`;
  document.body.appendChild(filterBox);

  const input = filterBox.querySelector('.filter-input');
  input.focus();
  input.select();
  input.addEventListener('input', () => {
    columnFilters[field] = input.value;
    th.classList.toggle('filtered', !!input.value);
    applyFilterUpdate(tab);
  });
  input.addEventListener('keydown', (ev) => { if (ev.key === 'Escape') closeColumnFilter(); });
  filterBox.querySelectorAll('.filter-list .ac-item').forEach((item, i) => {
    item.addEventListener('mousedown', (ev) => {
      ev.preventDefault();
      columnFilters[field] = distinct[i];
      th.classList.add('filtered');
      applyFilterUpdate(tab);
      closeColumnFilter();
    });
  });
  filterBox.querySelector('.filter-clear').addEventListener('mousedown', (ev) => {
    ev.preventDefault();
    delete columnFilters[field];
    th.classList.remove('filtered');
    applyFilterUpdate(tab);
    closeColumnFilter();
  });
  setTimeout(() => document.addEventListener('mousedown', onDocClickCloseFilter), 0);
}

function applyFilterUpdate(tab) {
  renderRows(tab);
  const lista = veiculosDaEquipe(tab);
  const countEl = document.getElementById(`count-${tab}`);
  const anyFilter = Object.values(columnFilters).some(Boolean);
  if (countEl) countEl.textContent = `${lista.length} veículo(s)` + (anyFilter ? ' · filtro ativo' : ' · arraste a borda de uma coluna pra redimensionar, clique no ▾ pra filtrar');
}

/* =====================================================================
   LEITURA DE PLACA POR FOTO (OCR local, gratuito — Tesseract.js)
   ===================================================================== */
let tesseractCarregado = null;
function carregarTesseract() {
  if (window.Tesseract) return Promise.resolve();
  if (tesseractCarregado) return tesseractCarregado;
  tesseractCarregado = new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5.0.4/dist/tesseract.min.js';
    script.onload = () => resolve();
    script.onerror = () => reject(new Error('Falha ao carregar leitor de placas'));
    document.head.appendChild(script);
  });
  return tesseractCarregado;
}

// 3 letras (muito confiável no OCR) + 4 letras/números (onde costuma confundir 0/O, 1/I, G/0 etc.)
const PLACA_FOTO_RE = /^[A-Z]{3}[A-Z0-9]{4}$/;

// Procura TODO trecho de 7 caracteres no texto lido que tenha o formato de
// placa — assim funciona mesmo com "BRASIL", bandeira etc. junto na mesma foto,
// já que essas palavras não vão bater no formato/na lista de placas reais.
function candidatosDePlaca(texto) {
  const candidatos = [];
  for (let i = 0; i + 7 <= texto.length; i++) {
    const janela = texto.substr(i, 7);
    if (PLACA_FOTO_RE.test(janela)) candidatos.push(janela);
  }
  return candidatos;
}

function distanciaHamming(a, b) {
  if (a.length !== b.length) return Infinity;
  let d = 0;
  for (let i = 0; i < a.length; i++) if (a[i] !== b[i]) d++;
  return d;
}

// Lista as placas reais cadastradas mais parecidas com o palpite do OCR,
// ordenadas da mais parecida pra menos (0 = idêntica).
function sugestoesDePlaca(candidata, max = 5) {
  if (!candidata || candidata.length !== 7) return [];
  const lista = [];
  for (const v of veiculos.values()) {
    const d = distanciaHamming(candidata, v.placa);
    if (d <= 3) lista.push({ placa: v.placa, dist: d });
  }
  lista.sort((a, b) => a.dist - b.dist);
  return lista.slice(0, max);
}

function aplicarPlacaFiltro(placa, placaInput, tab, statusEl, msg) {
  placaInput.value = placa;
  columnFilters.placa = placa;
  applyFilterUpdate(tab);
  if (statusEl) statusEl.textContent = msg || `✅ Filtrando por ${placa}`;
}

async function lerPlacaPorFoto(fileInput, placaInput, statusEl, tab) {
  const file = fileInput.files && fileInput.files[0];
  fileInput.value = '';
  if (!file) return;
  statusEl.textContent = '🖼️ Preparando a foto...';
  try {
    const blob = await prepararImagemParaOCR(file);
    processarOCR(blob, placaInput, statusEl, tab);
  } catch (e) {
    console.error(e);
    statusEl.textContent = '⚠️ Não consegui abrir essa foto. Tenta de novo.';
  }
}

// Usa a foto inteira (sem precisar recortar) — deixa em preto e branco com
// mais contraste, o que ajuda bastante o OCR a separar a placa do resto
// (moldura, bandeira, "BRASIL" etc.), que depois é filtrado pela busca por
// trechos parecidos com placas reais em candidatosDePlaca()/sugestoesDePlaca().
function prepararImagemParaOCR(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const maxLado = 1800;
      const escala = Math.min(1, maxLado / Math.max(img.naturalWidth, img.naturalHeight));
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.naturalWidth * escala);
      canvas.height = Math.round(img.naturalHeight * escala);
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const d = imgData.data;
      for (let i = 0; i < d.length; i += 4) {
        const cinza = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
        const contraste = Math.min(255, Math.max(0, (cinza - 128) * 1.6 + 128));
        d[i] = d[i + 1] = d[i + 2] = contraste;
      }
      ctx.putImageData(imgData, 0, 0);
      URL.revokeObjectURL(url);
      canvas.toBlob((blob) => resolve(blob), 'image/png');
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Falha ao carregar imagem')); };
    img.src = url;
  });
}

async function processarOCR(blob, placaInput, statusEl, tab) {
  statusEl.textContent = '📡 Carregando leitor de placas (só na primeira vez)...';
  try {
    await carregarTesseract();
    statusEl.textContent = '🔎 Lendo a placa recortada...';
    const worker = await window.Tesseract.createWorker('eng');
    await worker.setParameters({
      tessedit_pageseg_mode: '6', // bloco único de texto (aceita "BRASIL" + placa em linhas diferentes)
      tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789',
    });
    const { data } = await worker.recognize(blob);
    await worker.terminate();
    const limpo = (data.text || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
    const candidatos = candidatosDePlaca(limpo);

    if (candidatos.length) {
      // pra cada trecho candidato, acha a placa real mais parecida — fica com a melhor de todas
      let melhorGeral = null;
      const todasSugestoes = [];
      candidatos.forEach(cand => {
        const sugs = sugestoesDePlaca(cand, 5);
        sugs.forEach(s => {
          todasSugestoes.push(s);
          if (!melhorGeral || s.dist < melhorGeral.dist) melhorGeral = { ...s, bruta: cand };
        });
      });

      if (melhorGeral && melhorGeral.dist === 0) {
        aplicarPlacaFiltro(melhorGeral.placa, placaInput, tab, statusEl, `✅ Placa lida: ${melhorGeral.placa}`);
      } else {
        const bruta = melhorGeral ? melhorGeral.bruta : candidatos[0];
        placaInput.value = bruta;
        columnFilters.placa = bruta;
        applyFilterUpdate(tab);
        const unicas = [...new Map(todasSugestoes.map(s => [s.placa, s])).values()].sort((a, b) => a.dist - b.dist).slice(0, 5);
        const chips = unicas.map(s => `<button type="button" class="ocr-sug-btn" data-placa="${esc(s.placa)}">${esc(s.placa)}</button>`).join('');
        statusEl.innerHTML = `⚠️ O leitor entendeu "${esc(bruta)}" — clica na placa certa:` +
          (chips ? `<div class="ocr-sug-list">${chips}</div>` : ' nenhuma parecida encontrada, digite manualmente.');
        statusEl.querySelectorAll('.ocr-sug-btn').forEach(btn => {
          btn.addEventListener('click', () => aplicarPlacaFiltro(btn.dataset.placa, placaInput, tab, statusEl, `✅ Filtrando por ${btn.dataset.placa}`));
        });
      }
    } else {
      const bruto = limpo || '(nada)';
      statusEl.textContent = `⚠️ Não achei o padrão de placa. O leitor entendeu: "${bruto}" — tenta recortar mais justo (só letras/números, sem a moldura azul/BRASIL).`;
      console.log('[OCR placa] texto bruto lido:', data.text);
    }
  } catch (e) {
    console.error(e);
    statusEl.textContent = '⚠️ Erro ao ler a foto. Tenta de novo ou digita a placa manualmente.';
  }
}

/* =====================================================================
   EXPORTAR CSV (respeita os filtros ativos no momento)
   ===================================================================== */
function csvCell(v) {
  const s = v == null ? '' : String(v);
  return /[;"\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}

function exportarCSV(tab) {
  const lista = veiculosDaEquipe(tab);
  const headers = ['Placa', 'Tipo', 'Conjunto', 'Equipe', 'Motorista', 'Status Geral', 'Status',
    'Localização', 'UF', 'Destino Final', 'UF Destino', 'Região', 'Previsão Término',
    'Próximo Destino', 'Previsão Chegada Filial', 'Observações', 'HE 50% (período)', 'HE 100% (período)',
    'Km Percorrido (período)', 'Km/Dia (período)', 'Vel. Média (km/h)'];
  const rows = lista.map(v => {
    const p = programacao.get(v.id) || {};
    const ufA = extractUF(p.localizacao);
    const ufD = extractUF(p.destino_final);
    const semPonto = !p.motorista_matricula;
    const he = p.motorista_matricula ? heAtual.get(p.motorista_matricula) : null;
    const he50 = semPonto ? 'Sem ponto' : horasToHHMM(he && he.he50_horas != null ? he.he50_horas : 0);
    const he100 = semPonto ? 'Sem ponto' : horasToHHMM(he && he.he100_horas != null ? he.he100_horas : 0);
    const prod = produtividadeAtual.get(v.placa);
    return [v.placa, v.tipo, v.conjunto, v.equipe, p.motorista, p.status_geral, p.status,
      p.localizacao, ufA, p.destino_final, ufD, regiaoDaUF(ufD), p.previsao_termino,
      p.proximo_destino, p.previsao_chegada_filial, p.observacoes, he50, he100,
      prod ? prod.km_percorrido : 'Sem rastreador', prod ? prod.km_dia : '', prod ? prod.vel_media : ''];
  });
  const csv = String.fromCharCode(0xFEFF) + [headers, ...rows].map(r => r.map(csvCell).join(';')).join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `frota-visao-geral-${new Date().toISOString().slice(0, 10)}.csv`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

/* =====================================================================
   RENDER — página por equipe / visão geral
   ===================================================================== */
const VEICULO_FIELDS = new Set(['placa', 'tipo', 'conjunto', 'equipe']);
function fieldValue(v, p, field) {
  if (!field) return null;
  if (VEICULO_FIELDS.has(field)) return v[field];
  return p ? p[field] : null;
}

let columnFilters = {};
let sortState = { field: null, dir: 'asc' };
function veiculosDaEquipe(equipe) {
  let lista = [...veiculos.values()].filter(v => equipe === 'geral' || v.equipe === equipe);
  const active = Object.entries(columnFilters).filter(([, q]) => q);
  if (active.length) {
    lista = lista.filter(v => {
      const p = programacao.get(v.id);
      return active.every(([field, q]) => {
        const val = fieldValue(v, p, field);
        return val && String(val).toLowerCase().includes(q.toLowerCase());
      });
    });
  }
  if (sortState.field) {
    const f = sortState.field;
    const dir = sortState.dir === 'desc' ? -1 : 1;
    lista.sort((a, b) => {
      const va = fieldValue(a, programacao.get(a.id), f) || '';
      const vb = fieldValue(b, programacao.get(b.id), f) || '';
      return String(va).localeCompare(String(vb), 'pt-BR', { numeric: true }) * dir;
    });
  } else {
    lista.sort((a, b) => a.placa.localeCompare(b.placa));
  }
  return lista;
}

function heCellHtml(p) {
  if (!p.motorista_matricula) {
    return '<span class="ro muted" title="Motorista não encontrado no sistema de ponto/jornadas">Sem ponto</span>';
  }
  const he = heAtual.get(p.motorista_matricula);
  const he50 = (he && he.he50_horas != null) ? he.he50_horas : 0;
  const he100 = (he && he.he100_horas != null) ? he.he100_horas : 0;
  const texto = `50%: ${horasToHHMM(he50)} · 100%: ${horasToHHMM(he100)}`;
  return `<span class="ro" title="Período ${esc(periodoAtualHE || '')}">${esc(texto)}</span>`;
}

const META_KM_MENSAL = 10000;

function produtividadeCellHtml(v, p) {
  const semMeta = p && p.status_geral === 'Dedicado';
  const prod = produtividadeAtual.get(v.placa);
  if (!prod || prod.km_percorrido == null) {
    return '<span class="ro muted" title="Sem leitura de rastreador nesse período">Sem rastreador</span>';
  }
  const km = Math.round(prod.km_percorrido);
  const kmTxt = km.toLocaleString('pt-BR');
  const kmDia = prod.km_dia != null ? Math.round(prod.km_dia).toLocaleString('pt-BR') : '—';
  const dica = `Período ${prod.periodo} · ${kmDia} km/dia` +
    (prod.vel_media != null ? ' · Vel. média ' + Math.round(prod.vel_media) + ' km/h' : '') +
    (prod.dias_operacao != null ? ' · ' + prod.dias_operacao + ' dias em operação' : '') +
    (semMeta ? '' : ' · Meta: ' + META_KM_MENSAL.toLocaleString('pt-BR') + ' km');

  if (semMeta) {
    return `<span class="ro" title="${esc(dica)}">${kmTxt} km</span>`;
  }
  const pct = Math.round((km / META_KM_MENSAL) * 100);
  const cor = pct >= 100 ? 'var(--green)' : pct >= 70 ? 'var(--amber)' : 'var(--red)';
  return `<span class="prod-cell" title="${esc(dica)}">
    <span class="prod-top"><span class="mono">${kmTxt} km</span><span class="prod-pct" style="color:${cor}">${pct}%</span></span>
    <span class="prod-bar"><span class="prod-bar-fill" style="width:${Math.min(100, pct)}%;background:${cor}"></span></span>
  </span>`;
}

function badgeStatus(status) {
  if (!status) return '';
  const cls = STATUS_BADGE[status] || 'bn';
  return `<span class="badge ${cls}">${status}</span>`;
}

function renderPage(tab) {
  const page = document.getElementById(`page-${tab}`);
  if (!page) return;
  const editable = tab === currentTeam || (isAdmin && EQUIPES.includes(tab));

  const placaFilterBar = `

  const addForm = editable ? `
    <div class="addbar">

      <div class="fld"><label>Tipo</label><input id="addTipo" list="tiposList" placeholder="CAVALO - 6X2" style="width:140px"></div>

      <button class="btn-add" id="btnExportar">⬇ Exportar CSV</button>
    </div>` : '';

  const showEquipe = tab === 'geral';
  const cols = [
    ['Placa', 'placa', 6], ['Tipo', 'tipo', 6], ['Conj.', 'conjunto', 4],
    ...(showEquipe ? [['Equipe', 'equipe', 5]] : []),
    ['Motorista', 'motorista', 11], ['Status Geral', 'status_geral', 8], ['Status', 'status', 8],
    ['Localização', 'localizacao', 9], ['UF', null, 3], ['Destino Final', 'destino_final', 9], ['UF Dest.', null, 3], ['Região', null, 5],
    ['Prev. Térm.', 'previsao_termino', 5], ['Próx. Destino', 'proximo_destino', 7], ['Prev. Cheg. Filial', 'previsao_chegada_filial', 7],
    ['Obs.', 'observacoes', 6], ['H. Extra', null, 6], ['Produtiv.', null, 7],
    ...(editable ? [['', null, 4]] : []),
  ];
  const savedWidths = loadColWidths();
  const theadHtml = cols.map(([label, field, pct]) => {
    const saved = label && savedWidths[label];
    const width = saved ? `${saved}px` : `${pct}%`;
    const filterCls = field && columnFilters[field] ? ' filtered' : '';
    const fieldAttr = field ? ` data-field="${field}"` : '';
    const arrow = (field && sortState.field === field) ? (sortState.dir === 'asc' ? ' ▲' : ' ▼') : '';
    const labelSpan = field ? `<span class="th-label" data-sort-field="${field}">${label}${arrow}</span>` : label;
    return `<th data-label="${esc(label)}"${fieldAttr} class="${filterCls}" style="width:${width}">${labelSpan}${field ? ' <span class="fico">▾</span>' : ''}</th>`;
  }).join('');

  page.innerHTML = `

      <div class="cc-t">Veículos${tab !== 'geral' ? ' — ' + tab : ''}</div>

function renderRows(tab) {
  const tbody = document.getElementById(`tbody-${tab}`);
  if (!tbody) return;
  const editable = tab === currentTeam || (isAdmin && EQUIPES.includes(tab));
  const lista = veiculosDaEquipe(tab);
  tbody.innerHTML = lista.map(v => rowHtml(v, editable, tab === 'geral')).join('');
  if (editable) attachRowHandlers(tbody);
}

function rowHtml(v, editable, showEquipe) {
  const p = programacao.get(v.id) || {};
  const ufAtual = extractUF(p.localizacao);
  const ufDest = extractUF(p.destino_final);
  const regiao = regiaoDaUF(ufDest);
  const equipeCell = showEquipe ? `<td class="ro mono" data-label="Equipe">${v.equipe}</td>` : '';

  if (!editable) {
    return `<tr data-vid="${v.id}">
      <td class="mono" data-label="Placa">${esc(v.placa)}</td><td class="ro" data-label="Tipo">${esc(v.tipo)}</td><td class="ro" data-label="Conj.">${esc(v.conjunto)}</td>${equipeCell}
      <td class="ro" data-label="Motorista" title="${esc(p.motorista)}">${esc(p.motorista)}</td><td data-label="Status Geral">${badgeStatus(p.status_geral)}</td><td class="ro" data-label="Status" title="${esc(p.status)}">${esc(p.status)}</td>
      <td class="ro" data-label="Localização" title="${esc(p.localizacao)}">${esc(p.localizacao)}</td><td class="ro mono" data-label="UF">${ufAtual}</td>
      <td class="ro" data-label="Destino Final" title="${esc(p.destino_final)}">${esc(p.destino_final)}</td><td class="ro mono" data-label="UF Dest.">${ufDest}</td><td class="ro muted" data-label="Região">${regiao}</td>
      <td class="ro mono" data-label="Prev. Térm.">${esc(p.previsao_termino)}</td><td class="ro" data-label="Próx. Destino" title="${esc(p.proximo_destino)}">${esc(p.proximo_destino)}</td><td class="ro" data-label="Prev. Cheg. Filial" title="${esc(p.previsao_chegada_filial)}">${esc(p.previsao_chegada_filial)}</td>
      <td class="ro muted" data-label="Obs." title="${esc(p.observacoes)}">${esc(p.observacoes)}</td><td data-label="H. Extra">${heCellHtml(p)}</td><td data-label="Produtiv.">${produtividadeCellHtml(v, p)}</td>
    </tr>`;
  }

  return `<tr data-vid="${v.id}">
    <td class="mono" data-label="Placa">${v.placa}</td><td class="ro" data-label="Tipo">${v.tipo || ''}</td><td class="ro" data-label="Conj.">${v.conjunto || ''}</td>${equipeCell}

    <td data-label="Status Geral"><select class="cell-in" data-field="status_geral"><option value=""></option>${opts}</select></td>
    <td data-label="Status">${taHtml('status', p.status)}</td>
    <td data-label="Localização">${taHtml('localizacao', p.localizacao, 'CIDADE/UF')}</td>
    <td class="ro mono" data-label="UF">${ufAtual}</td>
    <td data-label="Destino Final">${taHtml('destino_final', p.destino_final, 'CIDADE/UF')}</td>
    <td class="ro mono" data-label="UF Dest.">${ufDest}</td><td class="ro muted" data-label="Região">${regiao}</td>
    <td data-label="Prev. Térm."><input class="cell-in" type="date" data-field="previsao_termino" value="${p.previsao_termino || ''}"></td>
    <td data-label="Próx. Destino">${taHtml('proximo_destino', p.proximo_destino)}</td>

    <td data-label="Obs.">${taHtml('observacoes', p.observacoes)}</td>
    <td data-label="H. Extra">${heCellHtml(p)}</td>
    <td data-label="Produtiv.">${produtividadeCellHtml(v, p)}</td>
    <td data-label="Ações">
      <button class="btn-hist" data-action="ver-historico" title="Ver histórico / desfazer">🕐</button>
      <button class="btn-del" data-action="del-veiculo" title="Remover veículo">✕</button>
    </td>
  </tr>`;
}

function esc(v) {
  return v == null ? '' : String(v).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function taHtml(field, value, placeholder) {
  const v = value == null ? '' : String(value);
  const ph = placeholder ? ` placeholder="${esc(placeholder)}"` : '';
  return `<textarea class="cell-in" rows="1" data-field="${field}" data-ac="${field}" title="${esc(v)}"${ph}>${esc(v)}</textarea>`;
}

function attachRowHandlers(tbody) {
  tbody.querySelectorAll('textarea.cell-in').forEach(autoGrow);
  tbody.querySelectorAll('[data-field]').forEach(el => {
    const vid = el.closest('tr').dataset.vid;
    const field = el.dataset.field;
    const key = `${vid}:${field}`;
    el.addEventListener('focus', () => {
      editingKey = key;
      if (el.dataset.ac) showSuggestions(el, el.dataset.ac);
    });
    el.addEventListener('blur', () => {
      editingKey = null;
      saveField(vid, field, el.value);
      setTimeout(hideSuggestions, 150);
    });
    if (el.tagName === 'SELECT' || el.type === 'date') el.addEventListener('change', () => saveField(vid, field, el.value));
    if (el.tagName === 'TEXTAREA') {
      el.addEventListener('input', () => { autoGrow(el); if (el.dataset.ac) showSuggestions(el, el.dataset.ac); });
      el.addEventListener('keydown', (ev) => { if (ev.key === 'Enter') { ev.preventDefault(); el.blur(); } if (ev.key === 'Escape') hideSuggestions(); });
    }
  });
  tbody.querySelectorAll('[data-action="del-veiculo"]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const vid = btn.closest('tr').dataset.vid;
      const v = veiculos.get(vid);
      if (!confirm(`Remover o veículo ${v?.placa}? Essa ação não pode ser desfeita.`)) return;
      await sb.from('veiculos').delete().eq('id', vid);
    });
  });
  tbody.querySelectorAll('[data-action="ver-historico"]').forEach(btn => {
    btn.addEventListener('click', () => abrirHistorico(btn.closest('tr').dataset.vid));
  });
}

const CAMPO_LABEL = {
  motorista: 'Motorista', status_geral: 'Status Geral', status: 'Status',
  localizacao: 'Localização', destino_final: 'Destino Final', previsao_termino: 'Previsão Término',
  proximo_destino: 'Próximo Destino', previsao_chegada_filial: 'Previsão Chegada Filial',
  observacoes: 'Observações', hora_extra: 'Hora Extra', produtividade: 'Produtividade',
};

async function abrirHistorico(veiculoId) {
  const v = veiculos.get(veiculoId);
  const { data: itens, error } = await sb.from('programacao_historico').select('*').eq('veiculo_id', veiculoId).order('alterado_em', { ascending: false }).limit(20);
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal-box">
    <h3>Histórico de edições — ${v?.placa || ''}</h3>
    ${error ? '<div class="muted">Erro ao carregar histórico.</div>' : ''}
    ${(!error && (!itens || !itens.length)) ? '<div class="muted">Nenhuma edição registrada ainda para este veículo.</div>' : ''}
    ${(itens || []).map(it => `<div class="hist-item" data-id="${it.id}">
      <div class="hist-info">
        <div class="hist-campo">${CAMPO_LABEL[it.campo] || it.campo}</div>
        <div class="hist-vals"><span class="old">${esc(it.valor_anterior) || '(vazio)'}</span> → <span class="new">${esc(it.valor_novo) || '(vazio)'}</span></div>
        <div class="hist-when">${new Date(it.alterado_em).toLocaleString('pt-BR')}</div>
      </div>
      <button class="btn-restore" data-campo="${it.campo}" data-valor="${esc(it.valor_anterior)}">Restaurar</button>
    </div>`).join('')}
    <button class="modal-close">Fechar</button>
  </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('.modal-close').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
  overlay.querySelectorAll('.btn-restore').forEach(btn => {
    btn.addEventListener('click', async () => {
      const campo = btn.dataset.campo;
      const valor = btn.dataset.valor;
      await sb.from('programacao').update({ [campo]: valor || null }).eq('veiculo_id', veiculoId);
      overlay.remove();
    });
  });
}

function isSubsequence(short, long) {
  let idx = 0;
  for (const tok of short) {
    let found = false;
    while (idx < long.length) {
      if (long[idx] === tok) { found = true; idx++; break; }
      idx++;
    }
    if (!found) return false;
  }
  return true;
}

function resolverMatriculaPorNome(nomeDigitado) {
  const norm = normalizeNome(nomeDigitado);
  if (nomeToMatricula.has(norm)) return nomeToMatricula.get(norm);
  const tokens = norm.split(' ').filter(Boolean);
  if (tokens.length < 2) return null;
  const candidatos = [];
  for (const m of motoristas.values()) {
    const longTokens = normalizeNome(m.nome).split(' ').filter(Boolean);
    if (isSubsequence(tokens, longTokens)) candidatos.push(m.matricula);
  }
  return candidatos.length === 1 ? candidatos[0] : null;
}

async function saveField(veiculoId, field, value) {
  const patch = { [field]: value || null };
  if (field === 'motorista') {
    patch.motorista_matricula = resolverMatriculaPorNome(value);
  }
  await sb.from('programacao').update(patch).eq('veiculo_id', veiculoId);
}

async function addVeiculo(equipe) {
  const placa = document.getElementById('addPlaca').value.trim().toUpperCase();
  const tipo = document.getElementById('addTipo').value.trim();
  const conjunto = document.getElementById('addConjunto').value.trim();
  if (!placa) { alert('Informe a placa.'); return; }
  const { error } = await sb.from('veiculos').insert({ placa, tipo, conjunto, equipe });
  if (error) { alert('Erro ao adicionar veículo: ' + error.message); return; }
  document.getElementById('addPlaca').value = '';
  document.getElementById('addTipo').value = '';
  document.getElementById('addConjunto').value = '';
}

/* =====================================================================
   REALTIME
   ===================================================================== */
function subscribeRealtime() {
  sb.channel('frota-realtime')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'programacao' }, handleProgramacaoChange)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'veiculos' }, handleVeiculoChange)
    .subscribe((status) => setLive(status === 'SUBSCRIBED'));
}

function setLive(ok) {
  document.getElementById('liveDot').classList.toggle('live', ok);
  document.getElementById('liveLabel').textContent = ok ? 'Tempo real: conectado' : 'Reconectando…';
}

function touchLastUpd() {
  const now = new Date();
  document.getElementById('lastUpd').textContent = 'Última mudança: ' + now.toLocaleTimeString('pt-BR');
}

function handleProgramacaoChange(payload) {
  const row = payload.new || payload.old;
  if (!row) return;
  const vid = row.veiculo_id;
  if (payload.eventType === 'DELETE') programacao.delete(vid);
  else programacao.set(vid, payload.new);
  touchLastUpd();
  rebuildSuggestions();
  refreshVisibleRow(vid);
}

function handleVeiculoChange(payload) {
  const row = payload.new || payload.old;
  if (!row) return;
  if (payload.eventType === 'DELETE') veiculos.delete(row.id);
  else veiculos.set(row.id, payload.new);
  touchLastUpd();
  // mudança estrutural (equipe/ativo) — mais simples re-renderizar as páginas visíveis
  if (activeTab === 'resumo') renderResumo();
  else if (activeTab !== 'historico') renderPage(activeTab);
}

function refreshVisibleRow(veiculoId) {
  if (activeTab === 'historico') return;
  if (activeTab === 'resumo') { renderResumo(); return; }
  const v = veiculos.get(veiculoId);
  if (!v) return;
  const tbody = document.getElementById(`tbody-${activeTab}`);
  if (!tbody) return;
  if (editingKey && editingKey.startsWith(veiculoId + ':')) return; // não sobrescreve edição em andamento
  const tr = tbody.querySelector(`tr[data-vid="${veiculoId}"]`);
  if (!tr) { renderRows(activeTab); return; }
  const editable = activeTab === currentTeam || (isAdmin && EQUIPES.includes(activeTab));
  tr.outerHTML = rowHtml(v, editable, activeTab === 'geral');
  const newTr = tbody.querySelector(`tr[data-vid="${veiculoId}"]`);
  if (newTr) {
    newTr.classList.add('flash');
    if (editable) attachRowHandlers(newTr);
  }
}

/* =====================================================================

   ===================================================================== */
function renderResumo() {
  const page = document.getElementById('page-resumo');
  if (!page) return;

  const grupos = {};
  STATUS_GERAL_OPTS.forEach(s => grupos[s] = []);
  grupos['(sem status)'] = [];
  [...veiculos.values()].forEach(v => {
    const p = programacao.get(v.id) || {};
    const key = (p.status_geral && grupos[p.status_geral]) ? p.status_geral : '(sem status)';
    grupos[key].push({ v, p });
  });

  const cardsHtml = Object.entries(grupos).filter(([, items]) => items.length).map(([status, items]) => {
    items.sort((a, b) => a.v.placa.localeCompare(b.v.placa));
    const cls = STATUS_BADGE[status] || 'bn';
    const linhas = items.map(({ v, p }) => `<tr>
      <td class="mono" data-label="Placa">${esc(v.placa)}</td>
      <td class="mono" data-label="Equipe">${esc(v.equipe)}</td>
      <td data-label="Motorista">${esc(p.motorista)}</td>
      <td data-label="Localização">${esc(p.localizacao)}</td>
      <td data-label="Destino">${esc(p.destino_final)}</td>
    </tr>`).join('');
    return `<div class="resumo-card">
      <button class="resumo-head" type="button">
        <span class="badge ${cls}">${esc(status)}</span>
        <span class="resumo-count">${items.length} veículo(s)</span>
        <span class="resumo-arrow">▾</span>
      </button>
      <div class="resumo-list hidden">
        <div class="scroll"><table class="dt">
          <thead><tr><th>Placa</th><th>Equipe</th><th>Motorista</th><th>Localização</th><th>Destino</th></tr></thead>
          <tbody>${linhas}</tbody>
        </table></div>
      </div>
    </div>`;
  }).join('');

  page.innerHTML = `
    <div class="hero"><div><div class="hero-title">Resumo <span>de Status</span></div><div class="hero-sub">Clique num status pra ver as placas — todas as equipes</div></div></div>
    <div class="cc">${cardsHtml || '<div class="muted">Nenhum veículo cadastrado ainda.</div>'}</div>`;

  page.querySelectorAll('.resumo-head').forEach(head => {
    head.addEventListener('click', () => {
      const list = head.nextElementSibling;
      list.classList.toggle('hidden');
      head.classList.toggle('open');
    });
  });
}

/* =====================================================================
   HISTÓRICO
   ===================================================================== */
function renderHistorico() {
  const page = document.getElementById('page-historico');
  const hoje = new Date().toISOString().slice(0, 10);
  page.innerHTML = `
    <div class="hero"><div><div class="hero-title">Histórico <span>Diário</span></div><div class="hero-sub">Foto do status de todos os veículos às 17h de cada dia</div></div></div>
    <div class="cc">
      <div class="cc-t">Selecionar data</div>
      <div class="cc-s">Snapshot gravado automaticamente todo dia às 17h (horário de Brasília)</div>
      <input type="date" id="histData" class="cell-in" style="width:160px;border-color:var(--brd2)" max="${hoje}" value="${hoje}">
      <div class="scroll" style="margin-top:14px"><table class="dt" id="histTable"></table></div>
    </div>`;
  document.getElementById('histData').addEventListener('change', loadHistorico);
  loadHistorico();
}

async function loadHistorico() {
  const data = document.getElementById('histData').value;
  const table = document.getElementById('histTable');
  table.innerHTML = '<caption class="muted">Carregando…</caption>';
  const { data: rows, error } = await sb.from('historico_status_diario').select('*').eq('data_referencia', data).order('equipe').order('placa');
  if (error) { table.innerHTML = `<caption>Erro ao carregar histórico.</caption>`; return; }
  if (!rows || !rows.length) { table.innerHTML = `<caption class="muted">Sem snapshot registrado para esta data.</caption>`; return; }
  table.innerHTML = `
    <thead><tr><th>Equipe</th><th>Placa</th><th>Tipo</th><th>Conjunto</th><th>Motorista</th><th>Status Geral</th><th>Status</th><th>Localização</th><th>Destino Final</th></tr></thead>
    <tbody>${rows.map(r => `<tr>
      <td class="mono">${r.equipe || ''}</td><td class="mono">${r.placa || ''}</td><td class="ro">${r.tipo || ''}</td><td class="ro">${r.conjunto || ''}</td>
      <td class="ro">${r.motorista || ''}</td><td>${badgeStatus(r.status_geral)}</td><td class="ro">${r.status || ''}</td>
      <td class="ro">${r.localizacao || ''}</td><td class="ro">${r.destino_final || ''}</td>
    </tr>`).join('')}</tbody>`;
}
</script>
